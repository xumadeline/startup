<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drinkly - Login</title>
    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Google Fonts: Nunito -->
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="main.css" />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <header>
      <h1>💧 Drinkly</h1>
      <nav>
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="leaderboard.html">Leaderboard</a>
        <a href="about.html">About</a>
      </nav>
    </header>

    <main>
      <div class="login-wrapper">
        <div class="login-card">
          <h2>Welcome Back</h2>
          <form>
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="you@example.com"
              required
            />

            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              required
            />

            <div class="login-buttons">
              <button type="submit" class="btn-primary-custom">Login</button>
              <button type="button" class="btn-outline-custom">
                Create Account
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>

    <footer>
      <p>Created by Madeline Xu</p>
      <p>
        <a href="https://github.com/madelinecharles/startup" target="_blank"
          >View on GitHub</a
        >
      </p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
